<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>list</title>
  </head>
  <body>
    <!-- Types of lists -->
    <!-- Unordered list -->
    <h3>Front-end</h3>
    <ul style="list-style-type: lower-roman">
      <li>HTML</li>
      <li>CSS</li>
      <li>Javascript</li>
      <li>React</li>
    </ul>
    <!-- Ordered list -->
    <h3>Back-end</h3>
    <ol type="i">
      <li>Nodejs</li>
      <li>Expressjs</li>
      <li>MongoDB</li>
    </ol>
    <!-- Description list -->
       <h3>Car</h3>
    
       <dl>

  <dt>Audi</dt>
  <dd>It is a red colored automatic car</dd>
  <dt>Ciaz</dt>
  <dd>It is a brown colored manual car</dd>
     </dl>
   

  </body>
</html>
